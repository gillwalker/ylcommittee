<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Young Life — Area Partnership Assessment</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f2; color: #1a1a18; line-height: 1.5; }
    #root { min-height: 100vh; }

    .primary-btn { background: #0F6E56; color: #fff; border: none; border-radius: 8px; padding: 12px 28px; font-size: 15px; font-weight: 500; cursor: pointer; transition: background 0.15s; display: inline-flex; align-items: center; gap: 8px; }
    .primary-btn:hover { background: #085041; }
    .primary-btn:disabled { background: #ccc; cursor: not-allowed; }
    .sec-btn { background: transparent; border: 1px solid #ccc; border-radius: 8px; padding: 11px 24px; font-size: 15px; cursor: pointer; color: #555; transition: all 0.15s; display: inline-flex; align-items: center; gap: 8px; }
    .sec-btn:hover { background: #ebebea; }
    .opt-btn { background: transparent; border: 1px solid #ddd; border-radius: 8px; padding: 10px 16px; cursor: pointer; font-size: 14px; color: #1a1a18; transition: all 0.15s; text-align: left; }
    .opt-btn:hover { background: #f0f0ee; }
    input[type=text], input[type=email] { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; background: #fff; color: #1a1a18; outline: none; font-family: inherit; }
    input[type=text]:focus, input[type=email]:focus { border-color: #0F6E56; box-shadow: 0 0 0 3px rgba(15,110,86,0.12); }
    .progress-bg  { background: #e0e0dc; border-radius: 4px; height: 4px; }
    .progress-fill { background: #0F6E56; border-radius: 4px; height: 4px; transition: width 0.4s ease; }
    .card { background: #fff; border: 1px solid #e2e2de; border-radius: 12px; }
    .pill { display: inline-flex; align-items: center; gap: 5px; padding: 4px 11px; border-radius: 20px; font-size: 12px; font-weight: 500; }
    .cat-tab { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 20px; border: 1px solid; font-size: 12px; font-weight: 500; cursor: pointer; white-space: nowrap; background: transparent; transition: all 0.15s; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { width: 48px; height: 48px; border: 3px solid #d0ece4; border-top-color: #0F6E56; border-radius: 50%; animation: spin 0.9s linear infinite; margin: 0 auto 1.5rem; }
    .page        { max-width: 700px; margin: 0 auto; padding: 2rem 1rem 5rem; }
    .page-narrow { max-width: 560px; margin: 0 auto; padding: 2rem 1rem 5rem; }

    /* ── REPORT PAGE (screen + print) ─────────────────────────────────── */
    .report-wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 1.5rem 1rem 3rem;
    }
    .report-toolbar {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 1.25rem;
    }

    /* The actual one-page report card */
    .report-card {
      background: #fff;
      border: 1px solid #e2e2de;
      border-radius: 12px;
      padding: 1.5rem 1.75rem;
      font-size: 13px;
    }

    /* Header row */
    .rpt-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      padding-bottom: 10px; border-bottom: 2px solid #0F6E56; margin-bottom: 12px;
      gap: 12px;
    }
    .rpt-title { font-size: 17px; font-weight: 700; color: #0F6E56; line-height: 1.15; }
    .rpt-subtitle { font-size: 10px; color: #888; letter-spacing: 0.06em; text-transform: uppercase; margin-top: 2px; }
    .rpt-meta { display: flex; flex-wrap: wrap; gap: 6px 14px; font-size: 11px; color: #555; justify-content: flex-end; }
    .rpt-meta-item { display: flex; align-items: center; gap: 4px; }

    /* Score + bars row */
    .rpt-top { display: flex; gap: 14px; margin-bottom: 12px; align-items: stretch; }
    .rpt-score-box {
      flex: 0 0 118px; background: #f7faf9; border: 1px solid #cce8e0;
      border-radius: 8px; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center; padding: 12px 8px;
    }
    .rpt-score-num   { font-size: 44px; font-weight: 700; line-height: 1; }
    .rpt-score-grade { font-size: 13px; font-weight: 700; margin-top: 2px; }
    .rpt-score-desc  { font-size: 10px; color: #666; margin-top: 3px; line-height: 1.35; }
    .rpt-score-pts   { font-size: 10px; color: #aaa; margin-top: 5px; }

    .rpt-cats { flex: 1; display: flex; flex-direction: column; gap: 6px; justify-content: center; }
    .rpt-cat-row { display: flex; align-items: center; gap: 8px; }
    .rpt-cat-icon { font-size: 13px; width: 16px; flex-shrink: 0; }
    .rpt-cat-label { width: 130px; font-size: 11px; font-weight: 500; color: #333; flex-shrink: 0; }
    .rpt-cat-bar-bg { flex: 1; background: #e8e8e4; border-radius: 3px; height: 8px; overflow: hidden; }
    .rpt-cat-bar-fill { height: 100%; border-radius: 3px; }
    .rpt-cat-pct { width: 28px; text-align: right; font-size: 11px; font-weight: 700; flex-shrink: 0; }
    .rpt-cat-pts { width: 28px; text-align: right; font-size: 10px; color: #aaa; flex-shrink: 0; }

    /* Insights section */
    .rpt-section-label {
      font-size: 9px; font-weight: 700; color: #0F6E56; text-transform: uppercase;
      letter-spacing: 0.08em; margin-bottom: 8px; display: flex; align-items: center; gap: 5px;
    }

    .rpt-summary {
      background: #f7faf9; border: 1px solid #cce8e0; border-radius: 6px;
      padding: 9px 11px; margin-bottom: 10px; font-size: 12px; line-height: 1.55; color: #222;
    }

    .rpt-two-col { display: flex; gap: 10px; margin-bottom: 10px; }
    .rpt-col { flex: 1; display: flex; flex-direction: column; gap: 8px; }

    .rpt-box { border-radius: 6px; padding: 8px 10px; }
    .rpt-box-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; display: flex; align-items: center; gap: 3px; }
    .rpt-box-text  { font-size: 11.5px; line-height: 1.5; margin: 0; }

    .rpt-steps-label { font-size: 9px; font-weight: 700; color: #185FA5; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; display: flex; align-items: center; gap: 4px; }
    .rpt-step { display: flex; gap: 8px; align-items: flex-start; margin-bottom: 6px; }
    .rpt-step-num { width: 18px; height: 18px; min-width: 18px; border-radius: 50%; background: #E6F1FB; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; color: #185FA5; flex-shrink: 0; margin-top: 1px; }
    .rpt-step-text { font-size: 11.5px; line-height: 1.5; }

    .rpt-quote { border-top: 1px solid #e8e8e4; padding-top: 8px; font-size: 11px; font-style: italic; color: #666; line-height: 1.5; }
    .rpt-footer { border-top: 1px solid #e8e8e4; padding-top: 7px; margin-top: 10px; font-size: 10px; color: #bbb; display: flex; justify-content: space-between; }

    /* ── PRINT ─────────────────────────────────────────────────────────── */
    @media print {
      @page { size: letter portrait; margin: 0.4in 0.45in; }
  body { background: #fff !important; }
  .no-print { display: none !important; }
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  .report-wrap { padding: 0; max-width: 100%; }
  .report-card { border: none; border-radius: 0; padding: 0; box-shadow: none; }
}

      /* Header */
      .rpt-header  { padding-bottom: 10pt; margin-bottom: 16pt; border-bottom-width: 2pt; }
      .rpt-title   { font-size: 18pt; }
      .rpt-subtitle{ font-size: 8pt; }
      .rpt-meta    { font-size: 9pt; gap: 5pt 14pt; }

      /* Score box */
      .rpt-top       { gap: 18pt; margin-bottom: 18pt; }
      .rpt-score-box { flex: 0 0 148pt; padding: 18pt 12pt; border-radius: 8pt; }
      .rpt-score-num   { font-size: 54pt; }
      .rpt-score-grade { font-size: 14pt; margin-top: 4pt; }
      .rpt-score-desc  { font-size: 9pt; margin-top: 5pt; }
      .rpt-score-pts   { font-size: 9pt; margin-top: 7pt; }

      /* Category bars */
      .rpt-cats      { gap: 10pt; }
      .rpt-cat-row   { gap: 9pt; }
      .rpt-cat-icon  { font-size: 11pt; width: 14pt; }
      .rpt-cat-label { width: 128pt; font-size: 10pt; }
      .rpt-cat-bar-bg  { height: 9pt; border-radius: 3pt; }
      .rpt-cat-pct   { font-size: 10pt; width: 26pt; }
      .rpt-cat-pts   { font-size: 8.5pt; width: 26pt; }

      /* Insights */
      .rpt-section-label { font-size: 8pt; margin-bottom: 9pt; }
      .rpt-summary { padding: 11pt 13pt; margin-bottom: 14pt; font-size: 10.5pt; line-height: 1.6; border-radius: 6pt; }

      .rpt-two-col { gap: 12pt; margin-bottom: 14pt; }
      .rpt-box     { padding: 10pt 12pt; border-radius: 6pt; }
      .rpt-box-label { font-size: 8pt; margin-bottom: 5pt; }
      .rpt-box-text  { font-size: 10pt; line-height: 1.55; }

      .rpt-steps-label { font-size: 8pt; margin-bottom: 7pt; }
      .rpt-step      { gap: 8pt; margin-bottom: 8pt; }
      .rpt-step-num  { width: 16pt; height: 16pt; min-width: 16pt; font-size: 8pt; }
      .rpt-step-text { font-size: 10pt; line-height: 1.55; }

      .rpt-quote  { padding-top: 10pt; font-size: 10pt; line-height: 1.55; }
      .rpt-footer { padding-top: 8pt; margin-top: 12pt; font-size: 8.5pt; }
    }

    @media (max-width: 540px) {
      .rpt-two-col { flex-direction: column; }
      .rpt-top { flex-direction: column; }
      .rpt-score-box { flex: none; flex-direction: row; justify-content: flex-start; gap: 16px; padding: 12px 16px; }
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState } = React;

const CATEGORIES = [
  {
    id: "direct_ministry", label: "Direct Ministry", icon: "ti-compass",
    color: "#0F6E56", bg: "#E1F5EE", textColor: "#085041",
    questions: [
      { id: "dm1", text: "Our Committee has a clear understanding of the state of local ministry in our Young Life Area.", options: ["Strongly Agree","Agree","Undecided","Disagree","Strongly Disagree"], scores: [5,4,3,2,1] },
      { id: "dm2", text: "Our Committee is actively involved with supporting local Clubs and ministries.", options: ["Very Active","Active","Neutral","Not Very Active","Not Active at All"], scores: [5,4,3,2,1] },
      { id: "dm3", text: "Members of our Committee regularly attend local Young Life Clubs/Events.", options: ["Very Regular","Regular","Not Sure","Not Much","Almost Never"], scores: [5,4,3,2,1] },
      { id: "dm4", text: "Our Committee regularly leverages Young Life camps to strategically engage with adults in our community (Adult Guests, family camping, etc).", options: ["Very Regular","Regular","Not Sure","Not Much","Almost Never"], scores: [5,4,3,2,1] },
      { id: "dm5", text: "We have a clear understanding of the alignment of our Core Ministry Impact (CMI) data and Direct ministry goals.", options: ["Very Clear","Clear","Somewhat Clear","Often Unclear","Not Clear at All"], scores: [5,4,3,2,1] },
      { id: "dm6", text: "We have a comprehensive discipleship plan for the adolescents in our community to progress through each 'age and stage' of ministry.", options: ["Strongly Agree","Agree","Undecided","Disagree","Strongly Disagree"], scores: [5,4,3,2,1] },
    ],
  },
  {
    id: "ministry_support", label: "Ministry Support", icon: "ti-users",
    color: "#185FA5", bg: "#E6F1FB", textColor: "#0C447C",
    questions: [
      { id: "ms1", text: "Our Committee has a strategic plan that forms the basis of our sub-committee activity and is referenced monthly or more.", options: ["Strongly Agree","Agree","Undecided","Disagree","Strongly Disagree"], scores: [5,4,3,2,1] },
      { id: "ms2", text: "The strategic plan for the Area drives the agenda for our monthly Committee meeting.", options: ["Strongly Agree","Agree","Undecided","Disagree","Strongly Disagree"], scores: [5,4,3,2,1] },
      { id: "ms3", text: "Our Committee clearly understands the structure of support and supervision of local area ministry and Regional oversight.", options: ["Very Clear","Clear","Somewhat Clear","Often Unclear","Not Clear at All"], scores: [5,4,3,2,1] },
      { id: "ms4", text: "We are aware of our Committee members' individual gifts and how those strengths align with their specific roles within the Committee.", options: ["Very Aware","Aware","Sometimes Aware","Often Unaware","Not Aware At All"], scores: [5,4,3,2,1] },
      { id: "ms5", text: "Communication with all parts of the ministry (staff, volunteers, committee, donors) is effective and efficient.", options: ["Strongly Agree","Agree","Undecided","Disagree","Strongly Disagree"], scores: [5,4,3,2,1] },
      { id: "ms6", text: "The Committee gives oversight to various Young Life administrative tasks on a regular and timely basis (cash flow, lapsed donor, budgets, etc).", options: ["Strongly Agree","Agree","Undecided","Disagree","Strongly Disagree"], scores: [5,4,3,2,1] },
    ],
  },
  {
    id: "spiritual_development", label: "Spiritual Development", icon: "ti-heart",
    color: "#533AB9", bg: "#EEEDFE", textColor: "#3C3489",
    questions: [
      { id: "sd1", text: "We have clearly defined standards for the Spiritual health of the Mission Community in our area.", options: ["Very Clear","Clear","Somewhat Clear","Often Unclear","Not Clear at All"], scores: [5,4,3,2,1] },
      { id: "sd2", text: "We have a current 'pulse' on the spiritual health of the Young Life Mission Community in our Area.", options: ["Strongly Agree","Agree","Undecided","Disagree","Strongly Disagree"], scores: [5,4,3,2,1] },
      { id: "sd3", text: "Our prayer team meets frequently to pray for the ministry broadly and for individual kids by name.", options: ["Very Frequently","Frequently","Not Sure","Infrequently","Never"], scores: [5,4,3,2,1] },
      { id: "sd4", text: "The ongoing spiritual formation of our staff and volunteer leaders via intentional relationships and activities are important to our Committee.", options: ["Very Important","Important","Neutral","Unimportant","Not At All Important"], scores: [5,4,3,2,1] },
      { id: "sd5", text: "The Young Life Mission Community in our Area frequently celebrates God's movement and provision.", options: ["Very Frequently","Frequently","Not Sure","Infrequently","Never"], scores: [5,4,3,2,1] },
      { id: "sd6", text: "We have a satisfactory implementation of a 'Matthew 9:38 List' to help identify, engage and invite new volunteers on all levels of the local mission.", options: ["Completely Satisfied","Satisfied","Neutral","Not Really Satisfied","Not At All Satisfied"], scores: [5,4,3,2,1] },
    ],
  },
  {
    id: "leadership_development", label: "Leadership Development", icon: "ti-chart-bar",
    color: "#854F0B", bg: "#FAEEDA", textColor: "#633806",
    questions: [
      { id: "ld1", text: "I generally meet with my Committee Chair/Area Director once a week.", options: ["Strongly Agree","Agree","Undecided","Disagree","Strongly Disagree"], scores: [5,4,3,2,1] },
      { id: "ld2", text: "Each person on our local Committee clearly understands expectations associated with their specific role on the Committee.", options: ["Very Clear","Clear","Somewhat Clear","Often Unclear","Not Clear at All"], scores: [5,4,3,2,1] },
      { id: "ld3", text: "Our committee interacts frequently with each other outside of regular monthly Committee meetings.", options: ["Very Frequently","Frequently","Not Sure","Infrequently","Never"], scores: [5,4,3,2,1] },
      { id: "ld4", text: "The Committee has an intentional rhythm and plan of caring for our local Area staff.", options: ["Very Intentional","Intentional","Neutral","Unintentional","Not at All Intentional"], scores: [5,4,3,2,1] },
      { id: "ld5", text: "As an Area, we foster regular interaction between the Committee and volunteer leaders throughout the year.", options: ["Very Regular","Regular","Not Sure","Not Much","Almost Never"], scores: [5,4,3,2,1] },
      { id: "ld6", text: "We take shared responsibility for ensuring that volunteer leaders are equipped and trained.", options: ["Almost Always","Most of the Time","Sometimes","Rarely","Almost Never"], scores: [5,4,3,2,1] },
    ],
  },
  {
    id: "resource_development", label: "Resource Development", icon: "ti-building-bank",
    color: "#993C1D", bg: "#FAECE7", textColor: "#712B13",
    questions: [
      { id: "rd1", text: "Our approach to fundraising is Biblically based and firmly rooted in a healthy theology of generosity and stewardship.", options: ["Strongly Agree","Agree","Undecided","Disagree","Strongly Disagree"], scores: [5,4,3,2,1] },
      { id: "rd2", text: "Our Committee practices the tenets of Young Life's 'Relationship Centered Engagement'.", options: ["Strongly Agree","Agree","Undecided","Disagree","Strongly Disagree"], scores: [5,4,3,2,1] },
      { id: "rd3", text: "Our committee has a yearly plan to consistently thank our donors well.", options: ["Always True","True","Undecided","Rarely True","Never True"], scores: [5,4,3,2,1] },
      { id: "rd4", text: "Our Committee is active in the planning and execution of events to help tell people about our ministry and community impact.", options: ["Very Active","Active","Neutral","Mostly Inactive","Not Active"], scores: [5,4,3,2,1] },
      { id: "rd5", text: "The Committee actively supports and engages with local churches and other ministry partners in our area.", options: ["Very Frequently","Frequently","Not Sure","Infrequently","Never"], scores: [5,4,3,2,1] },
      { id: "rd6", text: "Whenever possible we regularly tithe a portion of our financial resources to Young Life's 'Hard to Fund' Areas.", options: ["Very Regular","Regular","Not Sure","Not Much","Almost Never"], scores: [5,4,3,2,1] },
    ],
  },
];

const ALL_Q = CATEGORIES.flatMap(c => c.questions);
const TOTAL_POSSIBLE = ALL_Q.length * 5;

function getGrade(pct) {
  if (pct >= 90) return { label: "Thriving",     color: "#0F6E56", desc: "Exceptional alignment and partnership" };
  if (pct >= 75) return { label: "Strong",        color: "#185FA5", desc: "Healthy partnership with minor gaps" };
  if (pct >= 60) return { label: "Growing",       color: "#854F0B", desc: "Solid foundation, room to grow" };
  if (pct >= 45) return { label: "Developing",    color: "#993C1D", desc: "Important areas need attention" };
  return           { label: "Needs Focus",   color: "#A32D2D", desc: "Intentional rebuilding recommended" };
}

function App() {
  const [step, setStep]         = useState("intro");
  const [info, setInfo]         = useState({ name: "", email: "", area: "", region: "", role: "AD" });
  const [answers, setAnswers]   = useState({});
  const [catIndex, setCatIndex] = useState(0);
  const [aiInsights, setAiInsights] = useState(null);

  const totalAnswered = Object.keys(answers).length;
  const cat = CATEGORIES[catIndex];

  function handleAnswer(qid, score) { setAnswers(prev => ({ ...prev, [qid]: score })); }
  function catComplete(c) { return c.questions.every(q => answers[q.id] !== undefined); }

  function computeScores() {
    let total = 0;
    const catScores = {};
    for (const c of CATEGORIES) {
      let s = 0;
      for (const q of c.questions) s += answers[q.id] || 0;
      catScores[c.id] = s; total += s;
    }
    return { catScores, total };
  }

  async function nextCat() {
    if (catIndex < CATEGORIES.length - 1) { setCatIndex(catIndex + 1); window.scrollTo({ top: 0, behavior: "smooth" }); }
    else { await finishSurvey(); }
  }
  function prevCat() { if (catIndex > 0) { setCatIndex(catIndex - 1); window.scrollTo({ top: 0, behavior: "smooth" }); } }

  async function finishSurvey() {
    setStep("loading");
    const { catScores, total } = computeScores();
    const pct = Math.round((total / TOTAL_POSSIBLE) * 100);
    const grade = getGrade(pct);
    const weakCats = CATEGORIES
      .map(c => ({ label: c.label, pct: Math.round((catScores[c.id] / (c.questions.length * 5)) * 100) }))
      .filter(c => c.pct < 70).map(c => `${c.label} (${c.pct}%)`).join(", ");

    const prompt = `You are a Young Life regional coach helping an ${info.role === "AD" ? "Area Director" : "Committee Chair"} named ${info.name || "a leader"} understand their Mid-Year Report Card results.

Survey Results:
- Overall: ${pct}% (${grade.label})
- Direct Ministry: ${Math.round((catScores.direct_ministry / 30) * 100)}%
- Ministry Support: ${Math.round((catScores.ministry_support / 30) * 100)}%
- Spiritual Development: ${Math.round((catScores.spiritual_development / 30) * 100)}%
- Leadership Development: ${Math.round((catScores.leadership_development / 30) * 100)}%
- Resource Development: ${Math.round((catScores.resource_development / 30) * 100)}%
${weakCats ? `- Areas needing attention: ${weakCats}` : ""}

Respond ONLY with a valid JSON object — no markdown, no backticks, no extra text:
{
  "summary": "2-3 sentence personal summary addressing them by first name, warm and encouraging",
  "strength": "1 sentence naming their strongest area and why it matters for ministry partnership",
  "growth_area": "1-2 sentences naming the single most important area to develop and one specific reason why",
  "next_steps": ["concrete step 1 (25 words max)", "concrete step 2 (25 words max)", "concrete step 3 (25 words max)"],
  "encouragement": "1 sentence of biblical encouragement for their ministry partnership"
}`;

    try {
      const res = await fetch("https://yl-survey-proxy.gill-ec1.workers.dev", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000, messages: [{ role: "user", content: prompt }] }),
      });
      const data = await res.json();
      const text = data.content?.find(b => b.type === "text")?.text || "{}";
      setAiInsights(JSON.parse(text.replace(/```json|```/g, "").trim()));
    } catch {
      const { catScores: cs } = computeScores();
      const best = CATEGORIES.reduce((a, b) => (cs[a.id] > cs[b.id] ? a : b)).label;
      setAiInsights({
        summary: `Thank you for completing this assessment${info.name ? ", " + info.name.split(" ")[0] : ""}. Your score of ${pct}% reflects ${grade.label.toLowerCase()} partnership health in your Young Life Area. Please consider sharing these results with your area director/committee chair.`,
        strength: `Your strongest area is ${best}, which forms an important foundation for your ministry partnership and the kids you serve.`,
        growth_area: weakCats ? `Focus on ${weakCats.split(",")[0].split("(")[0].trim()} — strengthening this area will have the greatest impact on your overall partnership health.` : "Continue building on your strengths while looking for opportunities to deepen collaboration across all five areas.",
        next_steps: [
          "Schedule a dedicated 1:1 with your ministry partner to review these results together.",
          "Identify one concrete action step for your lowest-scoring category this month.",
          "Revisit this assessment together in 90 days to measure progress.",
        ],
        encouragement: '"Two are better than one, because they have a good return for their labor." — Ecclesiastes 4:9',
      });
    }
    setStep("results");
  }

  function resetAll() {
    setStep("intro"); setAnswers({}); setCatIndex(0); setAiInsights(null);
    setInfo({ name: "", email: "", area: "", region: "", role: "AD" });
    window.scrollTo({ top: 0 });
  }

  // ── INTRO ──────────────────────────────────────────────────────────────────
  if (step === "intro") return (
    <div className="page" style={{ textAlign: "center" }}>
      <div style={{ display: "inline-flex", alignItems: "center", gap: 10, marginBottom: "1.25rem", background: "#E1F5EE", padding: "8px 18px", borderRadius: 20 }}>
        <i className="ti ti-compass" style={{ fontSize: 18, color: "#0F6E56" }}></i>
        <span style={{ fontSize: 13, fontWeight: 600, color: "#0F6E56", letterSpacing: "0.06em", textTransform: "uppercase" }}>Young Life</span>
      </div>
      <h1 style={{ fontSize: 30, fontWeight: 700, margin: "0 0 0.75rem", lineHeight: 1.2 }}>Area Partnership<br />Assessment</h1>
      <p style={{ color: "#555", fontSize: 16, lineHeight: 1.7, maxWidth: 460, margin: "0 auto 1.5rem" }}>
        This mid-year report card measures the health and effectiveness of how well the Area Director and Committee Chair work together.
      </p>
      <div style={{ display: "flex", gap: 8, justifyContent: "center", flexWrap: "wrap", marginBottom: "2rem" }}>
        {[["ti-clock","15–20 min"],["ti-list","30 questions"],["ti-file-description","PDF report"]].map(([icon, label]) => (
          <span key={label} style={{ display: "inline-flex", alignItems: "center", gap: 5, fontSize: 12, fontWeight: 500, background: "#f0f0ee", color: "#555", padding: "4px 11px", borderRadius: 20 }}>
            <i className={`ti ${icon}`} style={{ fontSize: 13 }}></i> {label}
          </span>
        ))}
      </div>
      <div className="card" style={{ padding: "1.25rem 1.5rem", marginBottom: "1.5rem", textAlign: "left" }}>
        <p style={{ fontSize: 14, color: "#555", lineHeight: 1.7, margin: 0 }}>
          <strong style={{ color: "#1a1a18", fontWeight: 600 }}>Instructions:</strong> The Area Director and Committee Chair each fill out this assessment separately, then meet to discuss results — noting areas of alignment and disagreement. Use the conversation to designate next steps for the second half of the year.
        </p>
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: "2rem", textAlign: "left" }}>
        {CATEGORIES.map(c => (
          <div key={c.id} style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 16px", background: "#f5f5f3", borderRadius: 8 }}>
            <i className={`ti ${c.icon}`} style={{ fontSize: 18, color: c.color }}></i>
            <div>
              <div style={{ fontWeight: 600, fontSize: 14 }}>{c.label}</div>
              <div style={{ fontSize: 12, color: "#888" }}>{c.questions.length} questions</div>
            </div>
          </div>
        ))}
      </div>
      <button className="primary-btn" onClick={() => setStep("info")}>Begin Assessment <i className="ti ti-arrow-right"></i></button>
    </div>
  );

  // ── INFO ───────────────────────────────────────────────────────────────────
  if (step === "info") {
    const ok = info.name && info.email && info.area && info.region;
    return (
      <div className="page-narrow">
        <button className="sec-btn" onClick={() => setStep("intro")} style={{ marginBottom: "1.5rem", fontSize: 13, padding: "8px 14px" }}>
          <i className="ti ti-arrow-left"></i> Back
        </button>
        <h2 style={{ fontSize: 22, fontWeight: 700, marginBottom: "0.5rem" }}>Your information</h2>
        <p style={{ color: "#666", marginBottom: "1.5rem" }}>Used to personalize your results report.</p>
        <div style={{ display: "flex", flexDirection: "column", gap: 16, marginBottom: "2rem" }}>
          {[["Name","name","text","Full name"],["Email","email","email","your@email.com"],["Area Name","area","text","e.g. Boulder"],["Region Name","region","text","e.g. Front Range Region"]].map(([label, key, type, ph]) => (
            <div key={key}>
              <label style={{ fontSize: 13, fontWeight: 600, display: "block", marginBottom: 6 }}>{label}</label>
              <input type={type} placeholder={ph} value={info[key]} onChange={e => setInfo(p => ({ ...p, [key]: e.target.value }))} />
            </div>
          ))}
          <div>
            <label style={{ fontSize: 13, fontWeight: 600, display: "block", marginBottom: 6 }}>Role</label>
            <div style={{ display: "flex", gap: 10 }}>
              {[["AD","Area Director"],["CC","Committee Chair"]].map(([val, lbl]) => (
                <button key={val} className="opt-btn" style={{ flex: 1, textAlign: "center", borderColor: info.role === val ? "#0F6E56" : "#ddd", background: info.role === val ? "#E1F5EE" : "transparent", color: info.role === val ? "#085041" : "#1a1a18", fontWeight: info.role === val ? 600 : 400 }}
                  onClick={() => setInfo(p => ({ ...p, role: val }))}>{lbl}</button>
              ))}
            </div>
          </div>
        </div>
        <button className="primary-btn" disabled={!ok} onClick={() => { setStep("survey"); setCatIndex(0); }}>
          Start Assessment <i className="ti ti-arrow-right"></i>
        </button>
      </div>
    );
  }

  // ── LOADING ────────────────────────────────────────────────────────────────
  if (step === "loading") return (
    <div style={{ maxWidth: 480, margin: "0 auto", padding: "5rem 1rem", textAlign: "center" }}>
      <div className="spinner"></div>
      <h2 style={{ fontSize: 20, fontWeight: 600, marginBottom: "0.5rem" }}>Generating your insights…</h2>
      <p style={{ color: "#666" }}>Analyzing your responses and preparing personalized next steps.</p>
    </div>
  );

  // ── SURVEY ─────────────────────────────────────────────────────────────────
  if (step === "survey") {
    const progress   = (totalAnswered / ALL_Q.length) * 100;
    const canAdvance = catComplete(cat);
    return (
      <div className="page">
        <div style={{ marginBottom: "1.5rem" }}>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
            <span style={{ fontSize: 13, color: "#666" }}>{Math.round(progress)}% complete — {totalAnswered} of {ALL_Q.length} answered</span>
            <span style={{ fontSize: 13, color: "#666" }}>{catIndex + 1} / {CATEGORIES.length}</span>
          </div>
          <div className="progress-bg"><div className="progress-fill" style={{ width: `${progress}%` }}></div></div>
        </div>
        <div style={{ display: "flex", gap: 8, marginBottom: "1.5rem", overflowX: "auto", paddingBottom: 4 }}>
          {CATEGORIES.map((c, i) => (
            <button key={c.id} className="cat-tab"
              style={{ borderColor: i === catIndex ? c.color : "#ddd", background: i === catIndex ? c.bg : "transparent", color: i === catIndex ? c.color : "#777" }}
              onClick={() => setCatIndex(i)}>
              <i className={`ti ${c.icon}`} style={{ fontSize: 13 }}></i>
              {c.label}
              {catComplete(c) && <i className="ti ti-check" style={{ fontSize: 12, color: "#0F6E56" }}></i>}
            </button>
          ))}
        </div>
        <div className="card" style={{ padding: "1.5rem", marginBottom: "1.5rem" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: "1.5rem" }}>
            <i className={`ti ${cat.icon}`} style={{ fontSize: 22, color: cat.color }}></i>
            <h2 style={{ fontSize: 18, fontWeight: 700, margin: 0 }}>{cat.label}</h2>
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 28 }}>
            {cat.questions.map((q, qi) => (
              <div key={q.id}>
                <p style={{ fontSize: 15, lineHeight: 1.6, margin: "0 0 12px" }}>
                  <span style={{ color: "#888", fontSize: 13, marginRight: 6 }}>{qi + 1}.</span>{q.text}
                </p>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                  {q.options.map((opt, oi) => {
                    const sel = answers[q.id] === q.scores[oi];
                    return (
                      <button key={opt} className="opt-btn"
                        style={{ borderColor: sel ? cat.color : "#ddd", background: sel ? cat.bg : "transparent", color: sel ? cat.color : "#1a1a18", fontWeight: sel ? 600 : 400 }}
                        onClick={() => handleAnswer(q.id, q.scores[oi])}>{opt}</button>
                    );
                  })}
                </div>
              </div>
            ))}
          </div>
        </div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <button className="sec-btn" onClick={prevCat} style={{ visibility: catIndex === 0 ? "hidden" : "visible" }}>
            <i className="ti ti-arrow-left"></i> Previous
          </button>
          <button className="primary-btn" disabled={!canAdvance} onClick={nextCat}>
            {catIndex === CATEGORIES.length - 1 ? "Submit & View Results" : "Next Section"} <i className="ti ti-arrow-right"></i>
          </button>
        </div>
      </div>
    );
  }

  // ── RESULTS ────────────────────────────────────────────────────────────────
  if (step === "results") {
    const { catScores, total } = computeScores();
    const pct   = Math.round((total / TOTAL_POSSIBLE) * 100);
    const grade = getGrade(pct);
    const firstName = info.name ? info.name.split(" ")[0] : "Leader";
    const today = new Date().toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" });

    return (
      <div className="report-wrap">

        {/* Toolbar — screen only */}
        <div className="report-toolbar no-print">
          <h1 style={{ fontSize: 20, fontWeight: 700, margin: 0 }}>Your results</h1>
          <button className="primary-btn" onClick={() => window.print()} style={{ fontSize: 14, padding: "10px 20px" }}>
            <i className="ti ti-download"></i> Save / Print PDF
          </button>
        </div>

        {/* ── ONE-PAGE REPORT CARD (same markup for screen + print) ── */}
        <div className="report-card">

          {/* Header */}
          <div className="rpt-header">
            <div>
              <div className="rpt-title">Young Life — Area Partnership Assessment</div>
              <div className="rpt-subtitle">Mid-Year Report Card</div>
            </div>
            <div className="rpt-meta">
              <span className="rpt-meta-item"><i className="ti ti-user" style={{ fontSize: 11 }}></i> {info.name || "—"}</span>
              <span className="rpt-meta-item"><i className="ti ti-id-badge-2" style={{ fontSize: 11 }}></i> {info.role === "AD" ? "Area Director" : "Committee Chair"}</span>
              <span className="rpt-meta-item"><i className="ti ti-map-pin" style={{ fontSize: 11 }}></i> {info.area || "—"} · {info.region || "—"}</span>
              <span className="rpt-meta-item"><i className="ti ti-calendar" style={{ fontSize: 11 }}></i> {today}</span>
            </div>
          </div>

          {/* Score + Category bars */}
          <div className="rpt-top">
            <div className="rpt-score-box">
              <div className="rpt-score-num" style={{ color: grade.color }}>{pct}<span style={{ fontSize: 22 }}>%</span></div>
              <div className="rpt-score-grade" style={{ color: grade.color }}>{grade.label}</div>
              <div className="rpt-score-desc">{grade.desc}</div>
              <div className="rpt-score-pts">{total} / {TOTAL_POSSIBLE} pts</div>
            </div>
            <div className="rpt-cats">
              {CATEGORIES.map(c => {
                const s = catScores[c.id], max = c.questions.length * 5, cp = Math.round((s / max) * 100);
                return (
                  <div key={c.id} className="rpt-cat-row">
                    <i className={`ti ${c.icon} rpt-cat-icon`} style={{ color: c.color }}></i>
                    <span className="rpt-cat-label">{c.label}</span>
                    <div className="rpt-cat-bar-bg">
                      <div className="rpt-cat-bar-fill" style={{ width: `${cp}%`, background: c.color }}></div>
                    </div>
                    <span className="rpt-cat-pct" style={{ color: getGrade(cp).color }}>{cp}%</span>
                    <span className="rpt-cat-pts">{s}/{max}</span>
                  </div>
                );
              })}
            </div>
          </div>

          {/* AI Insights */}
          {aiInsights && (
            <>
              <div className="rpt-section-label">
                <i className="ti ti-sparkles" style={{ fontSize: 11 }}></i>
                Personalized insights for {firstName}
              </div>

              {/* Summary */}
              <div className="rpt-summary">{aiInsights.summary}</div>

              {/* Two columns */}
              <div className="rpt-two-col">

                {/* Left: strength + growth */}
                <div className="rpt-col">
                  <div className="rpt-box" style={{ background: "#E1F5EE", border: "1px solid #9FE1CB" }}>
                    <div className="rpt-box-label" style={{ color: "#0F6E56" }}>
                      <i className="ti ti-trophy" style={{ fontSize: 10 }}></i> Strength
                    </div>
                    <p className="rpt-box-text" style={{ color: "#085041" }}>{aiInsights.strength}</p>
                  </div>
                  <div className="rpt-box" style={{ background: "#FAEEDA", border: "1px solid #FAC775" }}>
                    <div className="rpt-box-label" style={{ color: "#854F0B" }}>
                      <i className="ti ti-target" style={{ fontSize: 10 }}></i> Growth Area
                    </div>
                    <p className="rpt-box-text" style={{ color: "#633806" }}>{aiInsights.growth_area}</p>
                  </div>
                </div>

                {/* Right: next steps */}
                <div className="rpt-col">
                  <div className="rpt-steps-label">
                    <i className="ti ti-checklist" style={{ fontSize: 12 }}></i> Recommended next steps
                  </div>
                  {aiInsights.next_steps.map((s, i) => (
                    <div key={i} className="rpt-step">
                      <div className="rpt-step-num">{i + 1}</div>
                      <div className="rpt-step-text">{s}</div>
                    </div>
                  ))}
                </div>

              </div>

              {/* Encouragement */}
              <div className="rpt-quote">{aiInsights.encouragement}</div>
            </>
          )}

          {/* Footer */}
          <div className="rpt-footer">
            <span>younglife.org</span>
            <span>Area Partnership Assessment — {info.role === "AD" ? "Area Director" : "Committee Chair"} Report</span>
            <span>{today}</span>
          </div>

        </div>{/* end report-card */}

        {/* Start over — screen only */}
        <div className="no-print" style={{ marginTop: "1.5rem", textAlign: "center" }}>
          <button className="sec-btn" onClick={resetAll}>
            <i className="ti ti-refresh"></i> Start over
          </button>
        </div>

      </div>
    );
  }

  return null;
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
